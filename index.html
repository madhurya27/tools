<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    :root {
      --content-max-width: 860px;
      --body-padding:      3rem 1rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.9rem; margin-bottom: 2.5rem; }
    .top-bar { margin-bottom: 1.5rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: var(--content-max-width);
    }

    a.tool-card {
      display: block;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    a.tool-card:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .tool-icon { font-size: 1.75rem; margin-bottom: 0.75rem; }
    .tool-name { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.3rem; }
    .tool-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  </div>

  <h1>Tools</h1>
  <p class="subtitle">A collection of small, useful utilities</p>

  <div class="grid">
    <a class="tool-card" href="tools/itinerary.html">
      <div class="tool-icon">🗺</div>
      <div class="tool-name">Travel Itinerary</div>
      <div class="tool-desc">Paste your itinerary and get a clean, printable layout with a shareable link.</div>
    </a>
    <a class="tool-card" href="tools/phonetic-converter.html">
      <div class="tool-icon">📡</div>
      <div class="tool-name">Phonetic Converter</div>
      <div class="tool-desc">Convert text into NATO phonetic codewords — Alpha, Bravo, Charlie…</div>
    </a>
  </div>

  <script>
    const html = document.documentElement;
    const btn = document.querySelector('.theme-toggle');

    function getEffectiveTheme() {
      const stored = localStorage.getItem('theme');
      if (stored === 'light' || stored === 'dark') return stored;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    const SUN = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`;
    const MOON = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      btn.innerHTML = theme === 'light' ? MOON : SUN;
    }

    function toggleTheme() {
      const next = getEffectiveTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    applyTheme(getEffectiveTheme());
  </script>
</body>
</html>
