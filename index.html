<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 860px;
    }

    a.tool-card {
      display: block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    a.tool-card:hover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }

    .tool-icon {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .tool-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.3rem;
    }

    .tool-desc {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Tools</h1>
  <p class="subtitle">A collection of small, useful utilities</p>

  <div class="grid">
    <a class="tool-card" href="nato-converter.html">
      <div class="tool-icon">📡</div>
      <div class="tool-name">NATO Phonetic Converter</div>
      <div class="tool-desc">Convert text into NATO phonetic codewords — Alpha, Bravo, Charlie…</div>
    </a>
  </div>
</body>
</html>
