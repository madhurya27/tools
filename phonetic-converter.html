<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonetic Converter</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    h1 { letter-spacing: 0.05em; }

    textarea {
      width: 100%;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #output-section { display: none; }
    #output-section.visible { display: block; }

    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    #copy-btn {
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      background: var(--btn-sec-bg);
      color: var(--btn-sec-color);
    }

    #copy-btn:hover {
      background: var(--btn-sec-hover-bg);
      color: var(--btn-sec-hover-color);
    }

    #copy-btn.copied { background: var(--accent-hover); color: var(--accent-pale); }

    #output {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .word-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      min-width: 80px;
      transition: background 0.2s, border-color 0.2s;
    }

    .original {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-light);
      text-transform: uppercase;
      line-height: 1;
    }

    .phonetic {
      font-size: 0.7rem;
      color: var(--accent-soft);
      margin-top: 0.25rem;
      text-align: center;
    }

    .space-marker {
      display: flex;
      align-items: center;
      color: var(--border);
      font-size: 1.2rem;
      padding: 0 0.1rem;
      align-self: center;
    }

    .unknown { color: var(--danger); }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="theme-toggle" onclick="toggleTheme()">☀ Light</button>
  </div>

  <h1>Phonetic Converter</h1>
  <p class="subtitle">Spell it out like a pro</p>

  <div class="card">
    <label for="input">Enter text</label>
    <textarea id="input" placeholder="Type or paste text here..." autofocus></textarea>

    <div class="controls">
      <button onclick="convert()">Convert</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>

    <div id="output-section">
      <div class="output-label">
        <label style="margin:0">Phonetic output</label>
        <button id="copy-btn" onclick="copyText()">Copy text</button>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <script>
    const NATO = {
      A: 'Alpha', B: 'Bravo', C: 'Charlie', D: 'Delta', E: 'Echo',
      F: 'Foxtrot', G: 'Golf', H: 'Hotel', I: 'India', J: 'Juliet',
      K: 'Kilo', L: 'Lima', M: 'Mike', N: 'November', O: 'Oscar',
      P: 'Papa', Q: 'Quebec', R: 'Romeo', S: 'Sierra', T: 'Tango',
      U: 'Uniform', V: 'Victor', W: 'Whiskey', X: 'X-ray', Y: 'Yankee',
      Z: 'Zulu',
      '0': 'Zero', '1': 'One', '2': 'Two', '3': 'Three', '4': 'Four',
      '5': 'Five', '6': 'Six', '7': 'Seven', '8': 'Eight', '9': 'Nine'
    };

    const html = document.documentElement;
    const btn = document.querySelector('.theme-toggle');

    function getEffectiveTheme() {
      const stored = localStorage.getItem('theme');
      if (stored === 'light' || stored === 'dark') return stored;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      btn.textContent = theme === 'light' ? '☽ Dark' : '☀ Light';
    }

    function toggleTheme() {
      const next = getEffectiveTheme() === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    applyTheme(getEffectiveTheme());

    function convert() {
      const text = document.getElementById('input').value;
      if (!text.trim()) return;

      const output = document.getElementById('output');
      const section = document.getElementById('output-section');
      output.innerHTML = '';

      const chars = text.toUpperCase().split('');
      let i = 0;

      while (i < chars.length) {
        const ch = chars[i];

        if (ch === ' ' || ch === '\n' || ch === '\t') {
          if (output.lastChild && !output.lastChild.classList.contains('space-marker')) {
            const sep = document.createElement('span');
            sep.className = 'space-marker';
            sep.textContent = '|';
            output.appendChild(sep);
          }
          i++;
          continue;
        }

        const group = document.createElement('div');
        group.className = 'word-group';

        const orig = document.createElement('span');
        orig.className = 'original';
        orig.textContent = ch;

        const phon = document.createElement('span');
        phon.className = 'phonetic';

        if (NATO[ch]) {
          phon.textContent = NATO[ch];
        } else {
          phon.textContent = ch;
          phon.classList.add('unknown');
        }

        group.appendChild(orig);
        group.appendChild(phon);
        output.appendChild(group);
        i++;
      }

      section.classList.add('visible');
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').innerHTML = '';
      document.getElementById('output-section').classList.remove('visible');
      document.getElementById('input').focus();
    }

    function copyText() {
      const text = document.getElementById('input').value.toUpperCase().split('').map(ch => {
        if (ch === ' ' || ch === '\n' || ch === '\t') return ' / ';
        return NATO[ch] || ch;
      }).join(' ').replace(/ \/ \s*/g, ' / ').trim();

      navigator.clipboard.writeText(text).then(() => {
        const copyBtn = document.getElementById('copy-btn');
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy text';
          copyBtn.classList.remove('copied');
        }, 1800);
      });
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        convert();
      }
    });
  </script>
</body>
</html>
